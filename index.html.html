<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전자계약 시스템</title>

<link rel="stylesheet" href="style.css">

<script defer src="script.js"></script>

</head>

<body>

<div class="wrap">

<div class="logo">
<img src="logo.png">
<h2>전자계약 시스템</h2>
</div>

<div class="progress">

<div class="item active">
<div class="circle">1</div>
<p>본인확인</p>
</div>

<div class="line"></div>

<div class="item">
<div class="circle">2</div>
<p>상품설명</p>
</div>

<div class="line"></div>

<div class="item">
<div class="circle">3</div>
<p>신탁계약</p>
</div>

<div class="line"></div>

<div class="item">
<div class="circle">4</div>
<p>완료</p>
</div>

</div>

<!-- STEP1 -->

<div class="step active" id="step1">

<h3>본인 확인</h3>

<label>성명</label>
<input type="text" id="name">

<label>휴대폰번호</label>
<input type="text"
id="phone"
maxlength="13"
oninput="phoneHyphen(this)">

<label>주민등록번호</label>

<div class="jumin">

<input
id="jumin1"
maxlength="6">

<span>-</span>

<input
id="jumin2"
maxlength="7"
oninput="saveJumin(this)"
onblur="hideJumin(this)"
onfocus="showRealJumin(this)">

</div>

<div class="agree">

<input type="checkbox" id="agree">

<label for="agree">
개인정보 수집 및 이용에 동의합니다.
</label>

</div>

<button
class="btn"
onclick="verifyUser()">

본인확인

</button>

<div id="verifyResult"></div>

<button
id="nextBtn"
class="btn"
disabled
onclick="nextStep2()">

다음

</button>

</div>

<!-- STEP2 -->

<div class="step" id="step2">

<h3>대출상품 설명서</h3>

<div class="contract">

<!-- 여기에 대출상품 설명서 내용 삽입 -->

</div>

<div class="signTitle">
전자서명
</div>

<canvas
id="sign1"
width="350"
height="180">
</canvas>

<div class="signBtn">

<button onclick="clearSign1()">
다시쓰기
</button>

<button onclick="nextStep3()">
다음
</button>

</div>

</div>

 <!-- STEP3 -->

<div class="step" id="step3">

<h3>해외 신탁펀드 계약서</h3>

<div class="contract">

<!-- 여기에 해외 신탁펀드 계약서 내용 삽입 -->

</div>

<div class="signTitle">

전자서명

</div>

<canvas
id="sign2"
width="350"
height="180">
</canvas>

<div class="signBtn">

<button onclick="clearSign2()">

다시쓰기

</button>

<button onclick="finishContract()">

전자계약 완료

</button>

</div>

</div>

<!-- 완료화면 -->

<div
class="step"
id="complete">

<div class="completeBox">

<img
src="complete.png"
class="completeImg">

<h2>

전자계약이 완료되었습니다.

</h2>

<p>

담당자의 안내를 기다려주시기 바랍니다.

</p>

<button
class="btn"
onclick="goHome()">

확인

</button>

</div>

</div>

</div>

</body>

</html>
